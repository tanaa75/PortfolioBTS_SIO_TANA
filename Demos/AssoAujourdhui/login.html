<!DOCTYPE html>
<html lang="fr" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Membre | Aujourd'hui vers Demain</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2904/2904869.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- On utilise le CSS original du projet -->
    <link rel="stylesheet" href="../../Stage2_Association_PHP/assets/css/auth.css">
    <style>
        .back-to-portfolio {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 9999;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.8rem;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    
    <a href="../../index.html" class="back-to-portfolio">← Retour au Portfolio</a>

    <!-- REPRODUCTION EXACTE DE LA CARTE DE CONNEXION ORIGINALE -->
    <div class="card card-custom shadow-lg p-4 p-md-5">
        
        <div class="text-center mb-4">
            <img src="https://cdn-icons-png.flaticon.com/512/2904/2904869.png" width="60" class="mb-3">
            <h3 class="fw-bold text-success">Espace Membre</h3>
            <p class="text-muted small">Heureux de vous revoir !</p>
        </div>
        
        <!-- Formulaire de connexion simulé -->
        <form onsubmit="event.preventDefault(); window.location.href='admin.html';">
            <div class="form-floating mb-3">
                <input type="email" class="form-control rounded-4" id="floatingInput" placeholder="name@example.com" value="admin@asso.fr" required>
                <label for="floatingInput">Adresse Email</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" class="form-control rounded-4" id="floatingPassword" placeholder="Password" value="••••••••" required>
                <label for="floatingPassword">Mot de passe</label>
            </div>
            
            <button type="submit" class="btn btn-success w-100 rounded-pill fw-bold py-3 fs-5 shadow">
                Se connecter
            </button>
        </form>
        
        <div class="text-center mt-3">
            <a href="#" class="text-decoration-none text-muted small">
                <i class="bi bi-key"></i> Mot de passe oublié ?
            </a>
        </div>

        <div class="d-grid gap-2 text-center mt-4">
            <a href="#" class="btn btn-outline-primary rounded-pill py-2 fw-bold border-2">
                Pas de compte ? Créer un compte
            </a>

            <a href="index.html" class="text-decoration-none text-secondary mt-2 py-2 fs-6">
                <i class="bi bi-arrow-left"></i> Retour à l'accueil
            </a>

            <div class="border-top pt-3 mt-2">
                <a href="#" class="text-decoration-none text-danger small fw-bold opacity-75">
                    <i class="bi bi-shield-lock-fill"></i> Accès Administrateur
                </a>
            </div>
        </div>

    </div>

</body>
</html>
