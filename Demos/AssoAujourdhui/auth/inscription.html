<!DOCTYPE html>
<html lang="fr" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | Aujourd'hui vers Demain</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2904/2904869.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
    <style>
        .back-to-portfolio {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 10000;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.8rem;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-light">

    <a href="../../index.html" class="back-to-portfolio">← Retour au Portfolio</a>

    <div class="card card-custom shadow-lg p-4 p-md-5" style="max-width: 500px; width: 90%;">
        <div class="text-center mb-4">
            <img src="https://cdn-icons-png.flaticon.com/512/2904/2904869.png" width="60" class="mb-3">
            <h3 class="fw-bold text-primary">Créer un compte</h3>
            <p class="text-muted small">Rejoignez l'association en quelques clics</p>
        </div>

        <form onsubmit="event.preventDefault(); alert('Ceci est une simulation. Votre compte a été créé avec succès !'); window.location.href='connexion.html';">
            <div class="form-floating mb-3">
                <input type="text" class="form-control rounded-4" id="nomInput" placeholder="Jean Dupont" required>
                <label for="nomInput"><i class="bi bi-person"></i> Nom complet</label>
            </div>
            <div class="form-floating mb-3">
                <input type="email" class="form-control rounded-4" id="emailInput" placeholder="name@example.com" required>
                <label for="emailInput"><i class="bi bi-envelope"></i> Email</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" class="form-control rounded-4" id="passInput" placeholder="Password" required minlength="6">
                <label for="passInput"><i class="bi bi-key"></i> Mot de passe (min. 6 car.)</label>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold py-3 fs-5 shadow">
                <i class="bi bi-person-plus me-2"></i>S'inscrire
            </button>
        </form>

        <div class="d-grid gap-2 text-center mt-4">
            <a href="connexion.html" class="btn btn-outline-secondary rounded-pill py-2 fw-bold border-2">
                Déjà membre ? Se connecter
            </a>
            <a href="../index.html" class="text-decoration-none text-secondary mt-2 py-2 fs-6">
                <i class="bi bi-arrow-left"></i> Retour à l'accueil
            </a>
        </div>
    </div>

</body>
</html>
