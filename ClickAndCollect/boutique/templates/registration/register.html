{% extends "boutique/base.html" %}

{% block content %}
<div style="max-width: 500px; margin: 40px auto; padding: 30px; border: 1px solid #ddd; border-radius: 10px; background-color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">

    <div style="text-align: center; margin-bottom: 30px;">
        <h1 style="color: #333; margin-bottom: 10px;">Créer un compte</h1>
        <p style="color: #666;">Rejoignez-nous pour commander en Click & Collect</p>
    </div>

    <form method="post" style="display: flex; flex-direction: column; gap: 15px;">
        {% csrf_token %}

        <style>
            /* Style pour que les champs Django soient plus jolis */
            form p { margin-bottom: 15px; }
            form input {
                width: 100%;
                padding: 10px;
                border: 1px solid #ccc;
                border-radius: 5px;
                box-sizing: border-box;
                margin-top: 5px;
            }
            form .helptext {
                display: block;
                font-size: 0.8em;
                color: #888;
                margin-top: 5px;
                line-height: 1.3;
            }
            form ul {
                padding-left: 20px;
                font-size: 0.8em;
                color: #d9534f;
                margin-top: 5px;
            }
        </style>

        {{ form.as_p }}

        <button type="submit" style="background: #007bff; color: white; padding: 12px; border: none; border-radius: 5px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 10px;">
            S'inscrire maintenant
        </button>
    </form>

    <div style="text-align: center; margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px;">
        <p style="color: #666;">Déjà inscrit ?
            <a href="{% url 'login' %}" style="color: #007bff; text-decoration: none; font-weight: bold;">Connectez-vous ici</a>
        </p>
    </div>
</div>
{% endblock %}
