<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertisseur de Devises</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Convertisseur de Devises</h2>
        <input type="number" id="amount" placeholder="Montant">
        <select id="fromCurrency">
            <option value="EUR">Euro (EUR)</option>
            <option value="USD">Dollar Américain (USD)</option>
            <option value="GBP">Livre Sterling (GBP)</option>
            <option value="JPY">Yen Japonais (JPY)</option>
            <option value="AUD">Dollar Australien (AUD)</option>
            <option value="BTC">Bitcoin (BTC)</option>
        </select>
        <select id="toCurrency">
            <option value="EUR">Euro (EUR)</option>
            <option value="USD">Dollar Américain (USD)</option>
            <option value="GBP">Livre Sterling (GBP)</option>
            <option value="JPY">Yen Japonais (JPY)</option>
            <option value="AUD">Dollar Australien (AUD)</option>
            <option value="BTC">Bitcoin (BTC)</option>
        </select>
        <button onclick="convertCurrency()">Convertir</button>
        <p id="result"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
